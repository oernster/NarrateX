<line class="ic" x1="486" y1="120" x2="506" y2="120"/>
<text class="ttl" x="490" y="172" text-anchor="middle">A clear chapter list</text>
<text class="sub" x="490" y="192" text-anchor="middle">jump anywhere instantly</text>
<line class="icb" x1="660" y1="100" x2="660" y2="116"/>
<line class="icb" x1="670" y1="92" x2="670" y2="124"/>
<line class="icb" x1="680" y1="86" x2="680" y2="130"/>
