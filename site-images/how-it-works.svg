<text class="sub" x="680" y="192" text-anchor="middle">natural voice, resumes</text>
<text class="sub" x="680" y="208" text-anchor="middle">right where you stopped</text>
<path class="ic" d="M848 116 A 22 22 0 0 1 892 116"/>
<rect class="icf" x="843" y="114" width="10" height="22" rx="4"/>
<rect class="icf" x="887" y="114" width="10" height="22" rx="4"/>
<text class="ttl" x="870" y="172" text-anchor="middle">You, hands-free</text>
<text class="sub" x="870" y="192" text-anchor="middle">around the house,</text>
<text class="sub" x="870" y="208" text-anchor="middle">on a headset</text>
<line class="arrow" x1="194" y1="150" x2="216" y2="150" marker-end="url(#nx-ah)"/>
<line class="arrow" x1="384" y1="150" x2="406" y2="150" marker-end="url(#nx-ah)"/>
<line class="arrow" x1="574" y1="150" x2="596" y2="150" marker-end="url(#nx-ah)"/>
<line class="arrow" x1="764" y1="150" x2="786" y2="150" marker-end="url(#nx-ah)"/>
<rect class="banner" x="30" y="262" width="920" height="40" rx="10"/>
<text class="bantx" x="490" y="287" text-anchor="middle">Runs entirely offline. Nothing leaves your device.</text>
</svg>
