<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="site-images/icon.png">
    <title>NarrateX</title>
    <meta charset="utf-8">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0b0f14;
            color: #e6edf3;
        }

        .logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            margin-right: 14px;
            vertical-align: middle;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 120px 20px 60px;
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .subtitle {
            font-size: 18px;
            color: #9da7b3;
            margin-bottom: 25px;
        }

        .actions a {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
        }

        .primary {
            background: #238636;
            color: white;
        }

        .secondary {
            border: 1px solid #30363d;
            color: #e6edf3;
        }

        .screenshots {
            margin-top: 40px;
        }

        .screenshots img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .minor-detail {
            margin-top: 30px;
            font-size: 14px;
            color: #6e7681;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>
        <img src="site-images/icon.png" class="logo" alt="NarrateX Logo">
        NarrateX
    </h1>

    <div class="subtitle">
        Deterministic EPUB to audiobook pipeline with structural navigation.
    </div>

    <div class="actions">
        <a class="primary" href="https://github.com/oernster/NarrateX/releases">
            Download
        </a>

        <a class="secondary" href="https://github.com/oernster/NarrateX">
            View source
        </a>
    </div>

    <div class="minor-detail">
        Local. Deterministic. No cloud dependency.
    </div>

    <div class="screenshots">
        <img src="site-images/NarrateX1.png" alt="NarrateX UI">
        <img src="site-images/NarrateX2.png" alt="NarrateX Sections View">
    </div>

</div>

</body>
</html>
